{% extends "base.html" %}
{% block title %}Сменить пароль{% endblock %}

{% block content %}
<section class="auth-page">
  <div class="auth-card">
    <h1>Сменить пароль</h1>
    <p class="muted">После смены пароля потребуется войти заново.</p>
    <form id="change-password-form" class="auth-form">
      <input 
        type="password" 
        name="old_password" 
        placeholder="Текущий пароль" 
        required
        autocomplete="current-password"
      />
      <input 
        type="password" 
        name="new_password" 
        placeholder="Новый пароль (мин. 8 символов)" 
        required 
        minlength="8"
        autocomplete="new-password"
      />
      <button type="submit" class="pill-button pill-button--primary">Изменить</button>
      <span id="change-password-error" class="muted"></span>
    </form>
    <div class="auth-actions">
      <a href="/">Назад</a>
    </div>
  </div>
</section>

<script src="/static/js/auth_change_password_page.js" defer></script>
{% endblock %}
