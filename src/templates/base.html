<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}OVC Human Notes{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/styles.css" />
    <link rel="stylesheet" href="/static/vendor/prism/prism-tomorrow.css" />
    <link rel="stylesheet" href="/static/css/prism-ovc.css" />
  </head>
  <body class="theme-brief" data-theme="brief">
    <header class="app-shell__topbar">
      <div class="app-shell__brand">
        <span class="app-shell__logo">OVC</span>
        <span class="app-shell__subtitle">Human Notes</span>
      </div>
      <nav class="app-shell__nav">
        <a href="/notes" class="nav-link">База</a>
        <a href="/" class="nav-link">Редактор</a>
        <a href="/graph" class="nav-link">Граф</a>
        <a href="/api/dataset/export" class="nav-link" target="_blank">JSONL</a>
        {% if user %}
          <span class="nav-link nav-link--user">{{ user.username }}</span>
          <a href="/change-password" class="nav-link">Пароль</a>
          <button class="nav-link nav-link--button" id="auth-logout">Выйти</button>
        {% else %}
          <span class="nav-link nav-link--user" id="nav-user" style="display: none;"></span>
          <a href="/change-password" class="nav-link" id="nav-password" style="display: none;">Пароль</a>
          <button class="nav-link nav-link--button" id="auth-logout" style="display: none;">Выйти</button>
          <a href="/login" class="nav-link" id="nav-login">Войти</a>
          <a href="/register" class="nav-link" id="nav-register">Регистрация</a>
        {% endif %}
      </nav>
    </header>
    <main id="app-root" class="app-shell__body">
      {% block content %}{% endblock %}
    </main>
    <footer class="app-shell__footer">
      <small>Offline · Готово к своей модели</small>
    </footer>
    <script defer src="/static/vendor/prism/prism.js" data-autoloader-path="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/"></script>
    <script defer src="/static/js/vendor/markdown-it.min.js"></script>
    <script defer src="/static/js/vendor/markdown-it-task-lists.min.js"></script>
    <script defer src="/static/js/vendor/markdown-it-sub.min.js"></script>
    <script defer src="/static/js/vendor/markdown-it-sup.min.js"></script>
    <script defer src="/static/js/vendor/markdown-it-footnote.min.js"></script>
    <script defer src="/static/js/vendor/dompurify.min.js"></script>
    <script>
      // Auth configuration - injected by server
      window.__AUTH_MODE = '{{ auth_mode | default("local") }}';
    </script>
    {% if auth_mode in ['supabase', 'both'] %}
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      window.__SUPABASE_URL = '{{ supabase_url }}';
      window.__SUPABASE_ANON_KEY = '{{ supabase_anon_key }}';
    </script>
    <script src="/static/js/supabase_auth.js"></script>
    {% endif %}
    <script type="module" src="/static/js/auth.js"></script>
    <script type="module" src="/static/js/theme.js"></script>
    {% block extra_scripts %}{% endblock %}
  </body>
</html>
