{% extends "base.html" %}
{% block title %}Заметки{% endblock %}
{% block content %}
<section class="card" id="notes-section">
  <h1>Заметки</h1>
  <form id="note-create-form" class="note-create-form">
    <input type="text" id="create-title" placeholder="Заголовок" required />
    <textarea id="create-content" rows="4" placeholder="Содержимое" required></textarea>
    <select id="create-priority">
      <option value="high">Высокий приоритет</option>
      <option value="medium" selected>Средний приоритет</option>
      <option value="low">Низкий приоритет</option>
    </select>
    <div class="note-create-meta">
      <label>Важность</label>
      <div class="range-with-value">
        <input type="range" id="create-importance" min="0.4" max="3" step="0.1" value="1.0" />
        <span id="create-importance-value">1.0</span>
      </div>
      <label>Группа</label>
      <input type="text" id="create-cluster" placeholder="Например: Основное" />
      <label>Цвет группы</label>
      <input type="color" id="create-cluster-color" value="#8b5cf6" />
    </div>
    <button type="submit">Создать</button>
  </form>
  <div id="notes-list" class="note-grid"></div>
</section>
{% endblock %}
{% block extra_scripts %}
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    const form = document.getElementById('note-create-form');
    const importanceInput = document.getElementById('create-importance');
    const importanceValue = document.getElementById('create-importance-value');
    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const payload = {
        title: document.getElementById('create-title').value,
        content_md: document.getElementById('create-content').value,
        priority: document.getElementById('create-priority').value,
        importance: Number(importanceInput.value),
        cluster: document.getElementById('create-cluster').value.trim(),
        cluster_color: document.getElementById('create-cluster-color').value,
      };
      const res = await fetch('/api/notes', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!res.ok) {
        alert('Не удалось создать заметку');
        return;
      }
      form.reset();
      importanceInput.value = '1.0';
      importanceValue.textContent = '1.0';
      document.getElementById('create-cluster-color').value = '#8b5cf6';
      document.getElementById('create-cluster').value = '';
      loadNotes();
    });

    importanceInput.addEventListener('input', () => {
      importanceValue.textContent = Number(importanceInput.value).toFixed(1);
    });

    const container = document.getElementById('notes-list');

    async function loadNotes() {
      const res = await fetch('/api/notes');
      if (!res.ok) return;
      const notes = await res.json();
      container.innerHTML = '';
      notes.forEach(note => {
        const card = document.createElement('a');
        card.href = `/notes/${note.id}`;
        card.className = 'note-card';
        const tags = (note.tags || []).map(tag => `#${tag.tag}`).join(', ');
        const clusterName = note.cluster && note.cluster !== 'default' ? note.cluster : '';
        const clusterColor = note.cluster_color || '#8b5cf6';
        const clusterMarkup = clusterName
          ? `<span class="note-cluster" style="--cluster-color: ${clusterColor};">${clusterName}</span>`
          : '';
        card.innerHTML = `
          <h3>${note.title}</h3>
          <p class="muted">Приоритет: ${note.priority} · Статус: ${note.status}</p>
          <p class="muted">Важность: ${Number(note.importance).toFixed(1)} ${clusterMarkup}</p>
          <p>${(note.content_md || '').slice(0, 140)}...</p>
          <p class="muted">${tags}</p>
        `;
        container.appendChild(card);
      });
    }

    await loadNotes();
  });
</script>
{% endblock %}
