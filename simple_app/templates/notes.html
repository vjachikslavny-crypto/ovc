{% extends "base.html" %}
{% block title %}Заметки{% endblock %}

{% block content %}
<div class="notes-page">
  <header class="notes-page__header">
    <h1>Мои заметки</h1>
    <div class="notes-page__actions">
      <input type="search" id="notes-search" placeholder="Поиск по заметкам" aria-label="Поиск" />
      <select id="theme-switcher" class="pill-button pill-button--compact" aria-label="Выбор темы">
        <option value="default">Фиолетовая</option>
        <option value="dark">Тёмная</option>
        <option value="milk">Молочная</option>
        <option value="light">Светлая</option>
      </select>
      <button class="pill-button" id="create-note">Новая</button>
    </div>
  </header>
  <section class="notes-page__list" id="notes-list" aria-live="polite"></section>
  <footer class="notes-page__footer">
    <button class="pill-button" id="load-more">Показать ещё</button>
  </footer>
</div>
{% endblock %}

{% block extra_scripts %}
  <script type="module" src="/static/js/notes_page.js"></script>
{% endblock %}
