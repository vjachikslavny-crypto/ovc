{% extends "base.html" %}
{% block title %}Заметка{% endblock %}
{% block content %}
<section class="card" id="note-card" data-id="{{ note_id }}">
  <header class="note-header">
    <div>
      <label>Заголовок</label>
      <input type="text" id="note-title-input" />
    </div>
    <div class="note-meta">
      <div class="meta-field">
        <label>Приоритет</label>
        <select id="note-priority">
          <option value="high">Высокий</option>
          <option value="medium">Средний</option>
          <option value="low">Низкий</option>
        </select>
      </div>
      <div class="meta-field">
        <label>Статус</label>
        <select id="note-status">
          <option value="active">Активная</option>
          <option value="backlog">Бэклог</option>
          <option value="archive">Архив</option>
        </select>
      </div>
      <div class="meta-field meta-field--importance">
        <label>Важность (размер на графе)</label>
        <div class="range-with-value">
          <input type="range" id="note-importance" min="0.4" max="3" step="0.1" />
          <span id="note-importance-value">1.0</span>
        </div>
      </div>
      <div class="meta-field">
        <label>Группа</label>
        <input type="text" id="note-cluster" placeholder="Например: Проекты" />
      </div>
      <div class="meta-field meta-field--color">
        <label>Цвет группы</label>
        <div class="color-input-wrap">
          <input type="color" id="note-cluster-color" value="#8b5cf6" />
          <span id="note-cluster-preview"></span>
        </div>
      </div>
      <button id="note-save-meta">Сохранить</button>
    </div>
  </header>

  <section class="note-body">
    <div class="note-content-panel">
      <h2>Содержимое</h2>
      <textarea id="note-editor" rows="16"></textarea>
      <div class="note-actions">
        <button id="note-save-content">Сохранить изменения</button>
        <button id="note-copy-md">Скопировать Markdown</button>
      </div>
    </div>
    <div class="note-preview-panel">
      <h2>Предпросмотр</h2>
      <article id="note-preview" class="note-preview"></article>
    </div>
  </section>

  <section class="note-tags">
    <h2>Теги</h2>
    <div id="tag-list" class="tag-list"></div>
    <form id="tag-form" class="inline-form">
      <input type="text" id="tag-input" placeholder="#тег" required />
      <input type="number" id="tag-weight" value="1" step="0.1" min="0.1" />
      <button type="submit">Добавить тег</button>
    </form>
  </section>

  <section class="note-links">
    <h2>Связи</h2>
    <div class="links-grid">
      <div>
        <h3>Исходящие</h3>
        <ul id="links-from"></ul>
      </div>
      <div>
        <h3>Входящие</h3>
        <ul id="links-to"></ul>
      </div>
    </div>
    <form id="link-form" class="inline-form">
      <select id="link-target" required></select>
      <select id="link-reason">
        <option value="manual">Ручная</option>
        <option value="semantic">Семантическая</option>
        <option value="task">Задача</option>
      </select>
      <input type="number" id="link-confidence" value="0.85" min="0" max="1" step="0.05" />
      <button type="submit">Добавить связь</button>
    </form>
  </section>

  <section class="note-sources">
    <h2>Источники</h2>
    <ul id="source-list" class="source-list"></ul>
  </section>

  <footer class="note-footer">
    <button id="note-delete" class="danger">Удалить заметку</button>
  </footer>
</section>
{% endblock %}
{% block extra_scripts %}
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    const card = document.getElementById('note-card');
    const noteId = card.dataset.id;
    const titleInput = document.getElementById('note-title-input');
    const editor = document.getElementById('note-editor');
    const preview = document.getElementById('note-preview');
    const prioritySelect = document.getElementById('note-priority');
    const statusSelect = document.getElementById('note-status');
    const importanceInput = document.getElementById('note-importance');
    const importanceValue = document.getElementById('note-importance-value');
    const clusterInput = document.getElementById('note-cluster');
    const clusterColorInput = document.getElementById('note-cluster-color');
    const clusterPreview = document.getElementById('note-cluster-preview');

    async function loadNote() {
      const res = await fetch(`/api/notes/${noteId}`);
      if (res.status === 404) {
        alert('Заметка не найдена. Возможно, она была удалена.');
        window.location.href = '/notes';
        return;
      }
      if (!res.ok) {
        alert('Не удалось загрузить заметку');
        return;
      }
      const note = await res.json();
      titleInput.value = note.title;
      editor.value = note.content_md;
      preview.innerHTML = marked.parse(note.content_md || '');
      prioritySelect.value = note.priority;
      statusSelect.value = note.status;
      importanceInput.value = note.importance.toFixed(1);
      importanceValue.textContent = Number(note.importance).toFixed(1);
      clusterInput.value = (note.cluster && note.cluster !== 'default') ? note.cluster : '';
      clusterColorInput.value = note.cluster_color || '#8b5cf6';
      clusterPreview.style.background = note.cluster_color || '#8b5cf6';
      renderTags(note.tags);
      renderLinks(note.links_from, note.links_to);
      renderSources(note.sources);
      await populateLinkTargets(noteId);
    }

    function renderTags(tags) {
      const container = document.getElementById('tag-list');
      container.innerHTML = '';
      if (!tags.length) {
        container.innerHTML = '<span class="muted">Теги не заданы</span>';
        return;
      }
      tags.forEach(tag => {
        const pill = document.createElement('button');
        pill.className = 'tag-pill';
        pill.textContent = `${tag.tag} (${tag.weight})`;
        pill.onclick = () => deleteTag(tag.tag);
        container.appendChild(pill);
      });
    }

    function renderLinks(outbound, inbound) {
      const fromList = document.getElementById('links-from');
      const toList = document.getElementById('links-to');
      fromList.innerHTML = '';
      toList.innerHTML = '';
      if (!outbound.length) {
        fromList.innerHTML = '<li class="muted">Нет исходящих связей</li>';
      }
      outbound.forEach(link => {
        const li = document.createElement('li');
        li.innerHTML = `<strong>${link.to_title}</strong> · ${link.reason} (${(link.confidence * 100).toFixed(0)}%)`;
        const remove = document.createElement('button');
        remove.textContent = '×';
        remove.className = 'link-remove';
        remove.onclick = () => deleteLink(link.id);
        li.appendChild(remove);
        fromList.appendChild(li);
      });

      if (!inbound.length) {
        toList.innerHTML = '<li class="muted">Нет входящих связей</li>';
      }
      inbound.forEach(link => {
        const li = document.createElement('li');
        li.innerHTML = `<strong>${link.to_title}</strong> · ${link.reason} (${(link.confidence * 100).toFixed(0)}%)`;
        toList.appendChild(li);
      });
    }

    function renderSources(sources) {
      const list = document.getElementById('source-list');
      list.innerHTML = '';
      if (!sources.length) {
        list.innerHTML = '<li class="muted">Источники отсутствуют</li>';
        return;
      }
      sources.forEach(src => {
        const li = document.createElement('li');
        li.innerHTML = `<a href="${src.url}" target="_blank">${src.title}</a> · ${src.domain}`;
        list.appendChild(li);
      });
    }

    async function populateLinkTargets(currentId) {
      const res = await fetch('/api/notes');
      if (!res.ok) return;
      const notes = await res.json();
      const select = document.getElementById('link-target');
      select.innerHTML = '';
      notes
        .filter(note => note.id !== currentId)
        .forEach(note => {
          const option = document.createElement('option');
          option.value = note.id;
          option.textContent = note.title;
          select.appendChild(option);
        });
    }

    document.getElementById('note-save-meta').addEventListener('click', async () => {
      const payload = {
        title: titleInput.value,
        priority: prioritySelect.value,
        status: statusSelect.value,
        importance: Number(importanceInput.value),
        cluster: clusterInput.value.trim(),
        cluster_color: clusterColorInput.value,
      };
      await fetch(`/api/notes/${noteId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      await loadNote();
    });

    document.getElementById('note-save-content').addEventListener('click', async () => {
      await fetch(`/api/notes/${noteId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content_md: editor.value })
      });
      await loadNote();
    });

    document.getElementById('note-copy-md').addEventListener('click', () => {
      navigator.clipboard.writeText(editor.value || '');
    });

    document.getElementById('tag-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const tag = document.getElementById('tag-input').value.trim();
      const weight = Number(document.getElementById('tag-weight').value) || 1;
      if (!tag) return;
      await fetch(`/api/notes/${noteId}/tags`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tag, weight })
      });
      document.getElementById('tag-input').value = '';
      await loadNote();
    });

    async function deleteTag(tag) {
      await fetch(`/api/notes/${noteId}/tags/${encodeURIComponent(tag)}`, {
        method: 'DELETE'
      });
      await loadNote();
    }

    document.getElementById('link-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const target_id = document.getElementById('link-target').value;
      const reason = document.getElementById('link-reason').value;
      const confidence = Number(document.getElementById('link-confidence').value) || 0.85;
      await fetch(`/api/notes/${noteId}/links`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ target_id, reason, confidence })
      });
      await loadNote();
    });

    async function deleteLink(linkId) {
      await fetch(`/api/notes/${noteId}/links/${linkId}`, {
        method: 'DELETE'
      });
      await loadNote();
    }

    document.getElementById('note-delete').addEventListener('click', async () => {
      if (!confirm('Удалить заметку?')) return;
      await fetch(`/api/notes/${noteId}`, { method: 'DELETE' });
      window.location.href = '/notes';
    });

    editor.addEventListener('input', () => {
      preview.innerHTML = marked.parse(editor.value || '');
    });

    importanceInput.addEventListener('input', () => {
      importanceValue.textContent = Number(importanceInput.value).toFixed(1);
    });

    clusterColorInput.addEventListener('input', () => {
      clusterPreview.style.background = clusterColorInput.value;
    });

    await loadNote();
  });
</script>
{% endblock %}
