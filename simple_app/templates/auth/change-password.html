{% extends "base.html" %}
{% block title %}Сменить пароль{% endblock %}

{% block content %}
<section class="auth-page">
  <div class="auth-card">
    <h1>Сменить пароль</h1>
    <p class="muted">После смены пароля потребуется войти заново.</p>
    <form id="change-password-form" class="auth-form">
      <input 
        type="password" 
        name="old_password" 
        placeholder="Текущий пароль" 
        required
        autocomplete="current-password"
      />
      <input 
        type="password" 
        name="new_password" 
        placeholder="Новый пароль (мин. 8 символов)" 
        required 
        minlength="8"
        autocomplete="new-password"
      />
      <button type="submit" class="pill-button pill-button--primary">Изменить</button>
      <span id="change-password-error" class="muted"></span>
    </form>
    <div class="auth-actions">
      <a href="/">Назад</a>
    </div>
  </div>
</section>

<script>
document.getElementById('change-password-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const formData = new FormData(e.target);
  const csrf = document.cookie.split('; ').find(row => row.startsWith('csrf_token='))?.split('=')[1];
  
  const errorEl = document.getElementById('change-password-error');
  errorEl.textContent = '';
  
  if (!csrf) {
    errorEl.textContent = 'CSRF токен не найден';
    return;
  }
  
  try {
    const res = await fetch('/auth/change-password', {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json',
        'X-CSRF-Token': csrf
      },
      body: JSON.stringify({
        old_password: formData.get('old_password'),
        new_password: formData.get('new_password')
      })
    });
    
    if (res.ok) {
      alert('Пароль изменен. Войдите заново.');
      window.location.href = '/login';
    } else {
      const err = await res.json();
      errorEl.textContent = err.detail || 'Ошибка смены пароля';
    }
  } catch (err) {
    errorEl.textContent = 'Ошибка сети';
  }
});
</script>
{% endblock %}
