<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OVC Desktop</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; display: grid; place-items: center; min-height: 100vh; background: #0b0b13; color: #e8e8f0; }
      .card { max-width: 560px; padding: 24px; border: 1px solid #2b2b37; border-radius: 12px; background: #12121a; }
      code { background: #1b1b27; padding: 2px 6px; border-radius: 6px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>OVC Desktop</h1>
      <p>This build expects local backend startup. Run <code>npm run desktop:dev</code> from project root.</p>
    </div>
  </body>
</html>
